<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>Iniciar Sesión — Adoradores Del Rey</title>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Nuestros estilos -->
    <link rel="stylesheet" href="src/styles/main.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: var(--c-bg);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-xl);
            box-shadow: var(--shadow-l);
            padding: 2.5rem 2rem;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .login-logo h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 1.7rem;
            color: var(--c-primary);
            letter-spacing: .5px;
        }
        .login-logo p { color: var(--c-muted); font-size: .9rem; margin-top: .35rem; }
        .login-card form { display: flex; flex-direction: column; gap: 1rem; }
        .login-card .form-group { display: flex; flex-direction: column; gap: .4rem; }
        .input-pw { position: relative; }
        .input-pw input { padding-right: 2.8rem; }
        .toggle-pw {
            position: absolute;
            right: .75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--c-muted);
            cursor: pointer;
            font-size: 1.1rem;
            line-height: 1;
            padding: 0;
        }
        .toggle-pw:hover { color: var(--c-text); }
        .forgot-link { text-align: right; font-size: .82rem; color: var(--c-primary); margin-top: .25rem; }
        .login-footer { text-align: center; margin-top: 1.25rem; font-size: .88rem; color: var(--c-muted); }
        .login-footer a { color: var(--c-primary); font-weight: 600; }
        .alert { display: none; padding: .8rem 1rem; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; border-radius: var(--r-md); font-size: .875rem; }
        .alert.visible { display: block; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <h1>Adoradores Del Rey</h1>
            <p>Sistema de Gestión Musical</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Correo electrónico</label>
                <input type="email" id="email" class="form-control" required placeholder="nombre@ejemplo.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <div class="input-pw">
                    <input type="password" id="password" class="form-control" required autocomplete="current-password" placeholder="Tu contraseña">
                    <button type="button" class="toggle-pw" id="togglePassword" title="Mostrar/ocultar contraseña">
                        <i class="bi bi-eye" id="pw-eye-icon"></i>
                    </button>
                </div>
                <div class="forgot-link">
                    <a href="#" id="forgotPasswordLink">¿Olvidaste tu contraseña?</a>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100" style="margin-top:.25rem;padding:.75rem">Entrar</button>
        </form>

        <div id="alert" class="alert" role="alert"></div>

        <div class="login-footer">
            ¿No tienes cuenta? <a href="register.html">Regístrate</a>
        </div>
    </div>

    <!-- Modal Recuperar Contraseña -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Recuperar Contraseña</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <p class="small text-muted mb-3">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>
                    <form id="forgotPasswordForm">
                        <div class="mb-3">
                            <input type="email" id="resetEmail" class="form-control" placeholder="nombre@ejemplo.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enviar enlace</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (solo para modal) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <script type="module">
        import { login, resetPasswordForEmail } from './src/js/auth.js';

        // Aplicar tema guardado
        const t = localStorage.getItem('adr-theme');
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

        const toggleBtn = document.getElementById('togglePassword');
        const eyeIcon = document.getElementById('pw-eye-icon');
        const pwInput = document.getElementById('password');

        toggleBtn.addEventListener('click', () => {
            const isPassword = pwInput.getAttribute('type') === 'password';
            pwInput.setAttribute('type', isPassword ? 'text' : 'password');
            eyeIcon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alert');
            alertBox.classList.remove('visible');
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Ingresando...';

            try {
                await login(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                window.location.href = 'index.html';
            } catch (error) {
                let message = error.message.includes('Invalid login credentials')
                    ? 'Correo o contraseña incorrectos.'
                    : 'Error al iniciar sesión. Inténtalo de nuevo.';
                alertBox.textContent = message;
                alertBox.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'Entrar';
            }
        });

        // Recuperar contraseña
        const forgotModal = new bootstrap.Modal(document.getElementById('forgotPasswordModal'));
        document.getElementById('forgotPasswordLink').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('resetEmail').value = document.getElementById('email').value;
            forgotModal.show();
        });
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await resetPasswordForEmail(document.getElementById('resetEmail').value);
                alert('Si el correo está registrado, recibirás un enlace para restablecer tu contraseña.');
                forgotModal.hide();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
