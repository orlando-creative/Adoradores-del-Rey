<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>Crear Cuenta — Adoradores Del Rey</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="src/styles/main.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: var(--c-bg);
        }
        .login-card {
            width: 100%; max-width: 400px;
            background: var(--c-surface);
            border: 1px solid var(--c-border);
            border-radius: var(--r-xl);
            box-shadow: var(--shadow-l);
            padding: 2.5rem 2rem;
        }
        .login-logo { text-align: center; margin-bottom: 1.75rem; }
        .login-logo h1 { font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.7rem; color: var(--c-primary); }
        .login-logo p  { color: var(--c-muted); font-size: .9rem; margin-top: .35rem; }
        .login-card form { display: flex; flex-direction: column; gap: 1rem; }
        .form-group { display: flex; flex-direction: column; gap: .4rem; }
        .input-pw { position: relative; }
        .input-pw input { padding-right: 2.8rem; }
        .toggle-pw { position: absolute; right:.75rem; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--c-muted); cursor:pointer; font-size:1.1rem; padding:0; }
        .toggle-pw:hover { color: var(--c-text); }
        .login-footer { text-align: center; margin-top: 1.25rem; font-size: .88rem; color: var(--c-muted); }
        .login-footer a { color: var(--c-primary); font-weight: 600; }
        .alert-box   { display: none; margin-top: .75rem; padding: .8rem 1rem; border-radius: var(--r-md); font-size: .875rem; border: 1px solid; }
        .alert-box.visible { display: block; }
        .alert-success { background: var(--c-success-bg); border-color: #a5d6a7; color: #1b5e20; }
        .alert-danger  { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <h1>Adoradores Del Rey</h1>
            <p>Crear nueva cuenta</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label class="form-label" for="name">Nombre Completo</label>
                <input type="text" id="name" class="form-control" required placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label class="form-label" for="email">Correo electrónico</label>
                <input type="email" id="email" class="form-control" required placeholder="nombre@ejemplo.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <div class="input-pw">
                    <input type="password" id="password" class="form-control" required placeholder="Mínimo 6 caracteres" autocomplete="new-password">
                    <button type="button" class="toggle-pw" id="togglePassword"><i class="bi bi-eye" id="pw-eye-icon"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100" style="margin-top:.25rem;padding:.75rem">Registrarse</button>
        </form>

        <div id="alert" class="alert-box" role="alert"></div>

        <div class="login-footer">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </div>
    </div>

    <script type="module">
        import { register } from './src/js/auth.js';

        const t = localStorage.getItem('adr-theme');
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');

        document.getElementById('togglePassword').addEventListener('click', function() {
            const inp = document.getElementById('password');
            const isPassword = inp.type === 'password';
            inp.type = isPassword ? 'text' : 'password';
            document.getElementById('pw-eye-icon').className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const alertBox = document.getElementById('alert');
            alertBox.classList.remove('visible', 'alert-success', 'alert-danger');
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Creando cuenta...';

            try {
                await register(
                    document.getElementById('email').value,
                    document.getElementById('password').value,
                    document.getElementById('name').value
                );
                alertBox.textContent = '¡Registro exitoso! Redirigiendo...';
                alertBox.classList.add('visible', 'alert-success');
                setTimeout(() => { window.location.href = 'index.html'; }, 1800);
            } catch (error) {
                let message = error.message;
                if (message.includes('User already registered')) {
                    message = 'Este correo ya está registrado. Inicia sesión.';
                } else if (message.includes('Password should be at least')) {
                    message = 'La contraseña debe tener al menos 6 caracteres.';
                } else {
                    message = 'Error durante el registro. Inténtalo de nuevo.';
                }
                alertBox.textContent = message;
                alertBox.classList.add('visible', 'alert-danger');
                btn.disabled = false;
                btn.textContent = 'Registrarse';
            }
        });
    </script>
</body>
</html>
