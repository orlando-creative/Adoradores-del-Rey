<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Church Music</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="../src/styles/main.css">
    <link rel="stylesheet" href="../src/styles/mobile.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4" style="max-width: 400px; width: 100%;">
        <h2 class="text-center mb-4">Crear Cuenta</h2>
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">Nombre Completo</label>
                <input type="text" id="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Registrarse</button>
        </form>
        <div id="alert" class="alert mt-3 d-none"></div>
        <div class="text-center mt-3">
            <a href="login.html">¿Ya tienes una cuenta? Inicia sesión</a>
        </div>
    </div>

    <script type="module">
        import { register } from '../src/js/auth.js';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alert');

            try {
                await register(email, password, name);
                alertBox.textContent = '¡Registro exitoso! Revisa tu correo para confirmar tu cuenta. Serás redirigido al login.';
                alertBox.className = 'alert alert-success mt-3';
                setTimeout(() => { window.location.href = 'login.html'; }, 4000);
            } catch (error) {
                alertBox.textContent = error.message;
                alertBox.className = 'alert alert-danger mt-3';
            }
        });
    </script>
</body>
</html>
