<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song Item</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/mobile.css">
</head>
<body>
    <div class="song-item">
        <h2 class="song-title" id="song-title"></h2>
        <div class="song-artist" id="song-artist"></div>
        <div class="song-lyrics" id="song-lyrics"></div>
        <div class="song-chords" id="song-chords"></div>
        <button class="btn btn-primary" id="edit-song-btn">Edit Song</button>
        <button class="btn btn-danger" id="delete-song-btn">Delete Song</button>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/modules/songs/songs-ui.js"></script>
</body>
</html>
